[platformio]
default_envs = gps

[base]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
upload_protocol = esp-builtin
upload_speed = 115200
build_flags =
    -DESP32S3
    -DCORE_DEBUG_LEVEL=5
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    m5stack/M5Unified
    https://github.com/m5stack/TinyGPSPlus
    jgromes/RadioLib

[env:gps]
extends = base
src_filter = +<gps.cpp>

[env:lora]
extends = base
src_filter = +<lora.cpp>
