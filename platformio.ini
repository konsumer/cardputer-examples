[platformio]
default_envs = gps

[base]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
lib_deps = 
    m5stack/M5Cardputer

[env:gps]
extends = base
src_filter = +<gps.cpp>
lib_deps = 
    ${base.lib_deps}
    https://github.com/m5stack/TinyGPSPlus

[env:lora]
extends = base
src_filter = +<lora.cpp>
lib_deps = 
    ${base.lib_deps}
    jgromes/RadioLib

[env:input]
extends = base
src_filter = +<input.cpp>

