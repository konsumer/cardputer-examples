name: PlatformIO Build

on:
  push:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build PlatformIO Project
        run: pio run

      - name: Collect firmware binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          shopt -s nullglob
          for built_dir in .pio/build/*; do
            if [[ -f "${built_dir}/firmware.bin" ]]; then
              env_name="$(basename "${built_dir}")"
              cp "${built_dir}/firmware.bin" "dist/${env_name}.bin"
            fi
          done
          ls -al dist

      - name: Publish battery on M5 Burner
        run: |
          cp src/battery/m5burner.json dist/battery-m5burner.json
          cp src/battery/battery.png dist/
          npx -y m5-burner publish-firmware dist/battery-m5burner.json
      - name: Publish button on M5 Burner
        run: |
          cp src/button/m5burner.json dist/button-m5burner.json
          cp src/button/button.png dist/
          npx -y m5-burner publish-firmware dist/button-m5burner.json
      - name: Publish display on M5 Burner
        run: |
          cp src/display/m5burner.json dist/display-m5burner.json
          cp src/display/display.png dist/
          npx -y m5-burner publish-firmware dist/display-m5burner.json
      - name: Publish gps on M5 Burner
        run: |
          cp src/gps/m5burner.json dist/gps-m5burner.json
          cp src/gps/gps.png dist/
          npx -y m5-burner publish-firmware dist/gps-m5burner.json
      - name: Publish ir on M5 Burner
        run: |
          cp src/ir/m5burner.json dist/ir-m5burner.json
          cp src/ir/ir.png dist/
          npx -y m5-burner publish-firmware dist/ir-m5burner.json
      - name: Publish keyboard on M5 Burner
        run: |
          cp src/keyboard/m5burner.json dist/keyboard-m5burner.json
          cp src/keyboard/keyboard.png dist/
          npx -y m5-burner publish-firmware dist/keyboard-m5burner.json
      - name: Publish lora on M5 Burner
        run: |
          cp src/lora/m5burner.json dist/lora-m5burner.json
          cp src/lora/lora.png dist/
          npx -y m5-burner publish-firmware dist/lora-m5burner.json
      - name: Publish motion on M5 Burner
        run: |
          cp src/motion/m5burner.json dist/motion-m5burner.json
          cp src/motion/motion.png dist/
          npx -y m5-burner publish-firmware dist/motion-m5burner.json
      - name: Publish sd on M5 Burner
        run: |
          cp src/sd/m5burner.json dist/sd-m5burner.json
          cp src/sd/sd.png dist/
          npx -y m5-burner publish-firmware dist/sd-m5burner.json
      - name: Publish sound on M5 Burner
        run: |
          cp src/sound/m5burner.json dist/sound-m5burner.json
          cp src/sound/sound.png dist/
          npx -y m5-burner publish-firmware dist/sound-m5burner.json

      - name: Upload firmware release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.bin
